<?xml version="1.0" encoding="UTF-8"?>
<!--
  Wick logomark — full-color variant.
  Source: Wick Brand Identity handoff (2026-04-21).
  Convert to .tga or .blp before using as a WoW texture.
-->
<svg width="80" height="96" viewBox="0 0 80 96" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- wick stem -->
  <rect x="38" y="52" width="4" height="36" fill="#4FC778" opacity="0.5"/>
  <!-- base / wax pool -->
  <ellipse cx="40" cy="88" rx="18" ry="5" fill="#4FC778" opacity="0.15"/>
  <rect x="22" y="83" width="36" height="8" rx="1" fill="#383058"/>
  <rect x="22" y="83" width="36" height="8" rx="1" fill="#4FC778" opacity="0.12"/>
  <!-- flame outer -->
  <path d="M40 8 C40 8, 58 30, 58 50 C58 63.8, 50.1 72, 40 72 C29.9 72, 22 63.8, 22 50 C22 30, 40 8 Z" fill="#4FC778" opacity="0.18"/>
  <!-- flame mid -->
  <path d="M40 18 C40 18, 52 36, 52 50 C52 59.9, 46.6 66, 40 66 C33.4 66, 28 59.9, 28 50 C28 36, 40 18 Z" fill="#4FC778" opacity="0.35"/>
  <!-- flame core -->
  <path d="M40 28 C40 28, 47 40, 47 50 C47 54.9, 43.9 58, 40 58 C36.1 58, 33 54.9, 33 50 C33 40, 40 28 Z" fill="#4FC778" opacity="0.8"/>
  <!-- flame highlight -->
  <path d="M40 36 C40 36, 43.5 43, 43.5 50 C43.5 52.8, 42 54.5, 40 54.5 C38 54.5, 36.5 52.8, 36.5 50 C36.5 43, 40 36 Z" fill="#D4C8A1" opacity="0.7"/>
  <!-- wick dot top -->
  <circle cx="40" cy="52" r="2" fill="#4FC778"/>
  <!-- corner bracket: top-left -->
  <path d="M4 4 L4 16 M4 4 L16 4" stroke="#4FC778" stroke-width="2" stroke-linecap="square"/>
  <!-- corner bracket: bottom-right -->
  <path d="M76 92 L76 80 M76 92 L64 92" stroke="#4FC778" stroke-width="2" stroke-linecap="square"/>
</svg>
